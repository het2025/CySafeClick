<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Safety Score - SafeClick</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .quiz-container {
            max-width: 800px;
            margin: var(--space-4) auto;
            background: var(--surface);
            padding: var(--space-4);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }
        .progress-bar {
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            margin-bottom: var(--space-4);
            overflow: hidden;
        }
        #progress-fill {
            height: 100%;
            background: var(--accent-saffron);
            width: 0%;
            transition: width 0.3s ease;
        }
        .question-box h2 { margin-bottom: var(--space-3); }
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .option {
            padding: 15px;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 600;
        }
        .option:hover {
            border-color: var(--accent-saffron);
            background: rgba(255,153,51,0.05);
        }
        .option.selected {
            border-color: var(--accent-saffron);
            background: var(--accent-saffron);
            color: var(--primary);
        }
        #results-page { display: none; text-align: center; }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 10px solid var(--accent-saffron);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 800;
            margin: 0 auto var(--space-3);
        }
        .chart-container {
            max-width: 400px;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo" data-i18n="LOGO.NAME">SafeClick</a>
            <nav class="nav-links">
                <a href="index.html" data-i18n="NAV.HOME">Home</a>
                <a href="index.html#tools" data-i18n="NAV.TOOLS">Tools</a>
                <a href="scam-awareness.html" data-i18n="NAV.LEARN">Learn</a>
                <a href="report-cybercrime.html" data-i18n="NAV.REPORT">Report</a>
            </nav>
            <div class="controls">
                <button id="lang-toggle" class="btn-lang">हिंदी</button>
                <button id="theme-toggle" class="btn-icon">🌙</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="quiz-container">
            <div id="quiz-page">
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <div id="question-area" class="question-box">
                    <h3 id="question-text" data-i18n="SAFETY_SCORE.LOADING">Loading question...</h3>
                    <div class="options" id="options-list"></div>
                </div>
            </div>

            <div id="results-page">
                <h2 data-i18n="SAFETY_SCORE.RESULTS_TITLE">Your Safety Score</h2>
                <div class="score-circle" id="final-score">0</div>
                <h3 id="grade-text">Grade: -</h3>
                
                <div class="chart-container">
                    <canvas id="scoreChart"></canvas>
                </div>

                <div id="recommendations" style="text-align: left; margin-top: 20px; padding: 15px; background: var(--bg); border-radius: 8px;">
                    <h4 data-i18n="SAFETY_SCORE.TIPS_TITLE">Personalized Tips:</h4>
                    <ul id="rec-list" style="padding-left: 20px; margin-top: 10px;"></ul>
                </div>

                <button onclick="location.reload()" class="btn-cta" style="margin-top: 20px;" data-i18n="SAFETY_SCORE.RETAKE">Retake Quiz</button>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-bottom">
            <p data-i18n="FOOTER.DISCLAIMER">This site does not store your passwords or personal data. All analysis is done in your browser.</p>
            <p class="legal-links"><a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
