<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scam Awareness - SafeClick</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .scam-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-3);
            margin-top: var(--space-4);
        }
        .scam-card {
            background: var(--surface);
            padding: var(--space-3);
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: var(--transition);
        }
        .scam-card:hover { transform: scale(1.02); }
        .scam-icon { font-size: 2rem; margin-bottom: 10px; display: block; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-content {
            background: var(--surface);
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 12px;
            padding: var(--space-4);
            position: relative;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .scam-detail-section { margin-top: 20px; }
        .scam-detail-section h4 { color: var(--accent-saffron); margin-bottom: 5px; }
        .red-flags-list { list-style: "🚩 "; padding-left: 20px; }
        
        .quiz-section {
            margin-top: var(--space-6);
            background: var(--primary);
            color: white;
            padding: var(--space-5) var(--space-2);
            border-radius: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo" data-i18n="LOGO.NAME">SafeClick</a>
            <nav class="nav-links">
                <a href="index.html" data-i18n="NAV.HOME">Home</a>
                <a href="index.html#tools" data-i18n="NAV.TOOLS">Tools</a>
            </nav>
            <div class="controls">
                <button id="lang-toggle" class="btn-lang">हिंदी</button>
                <button id="theme-toggle" class="btn-icon">🌙</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div style="margin-top: var(--space-4);">
            <h1 data-i18n="SCAM_AWARENESS.TITLE">Scam Awareness</h1>
            <p data-i18n="SCAM_AWARENESS.SUBTITLE">Know the common tactics scammers use in India and how to stay safe.</p>
        </div>

        <div class="scam-grid" id="scam-grid"></div>

        <div class="quiz-section" id="mini-quiz">
            <h2 data-i18n="SCAM_AWARENESS.QUIZ_TITLE">Scam or Legit?</h2>
            <p data-i18n="SCAM_AWARENESS.QUIZ_SUBTITLE">Can you spot the fraud in these real-life scenarios?</p>
            <div id="scenario-box" style="margin: 30px auto; max-width: 500px; background: white; color: black; padding: 20px; border-radius: 12px; text-align: left;">
                <p id="scenario-text"></p>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn-scan" style="background: var(--danger);" onclick="checkScenario('scam')" data-i18n="COMMON.SCAM">SCAM</button>
                    <button class="btn-scan" style="background: var(--safe);" onclick="checkScenario('legit')" data-i18n="COMMON.LEGIT">LEGIT</button>
                </div>
            </div>
            <p id="scenario-feedback"></p>
        </div>
    </main>

    <footer>
        <div class="container footer-bottom">
            <p data-i18n="FOOTER.DISCLAIMER">This site does not store your passwords or personal data. All analysis is done in your browser.</p>
            <p class="legal-links"><a href="privacy.html">Privacy</a> · <a href="terms.html">Terms</a></p>
        </div>
    </footer>

    <div class="modal" id="scam-modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
    <script src="js/scam.js"></script>
</body>
</html>
